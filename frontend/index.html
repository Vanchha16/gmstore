<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GM Store</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root">
      <!-- Premium CSS Initial Loader -->
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background-color: #020617;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .spinner-ring {
          position: relative;
          width: 80px;
          height: 80px;
          margin-bottom: 24px;
        }
        .spinner-ring div {
          box-sizing: border-box;
          display: block;
          position: absolute;
          width: 64px;
          height: 64px;
          margin: 8px;
          border: 3px solid transparent;
          border-radius: 50%;
          animation: spin-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        .spinner-ring div:nth-child(1) {
          border-top-color: #8b5cf6;
          animation-delay: -0.45s;
        }
        .spinner-ring div:nth-child(2) {
          border-top-color: #a78bfa;
          animation-delay: -0.3s;
        }
        .spinner-ring div:nth-child(3) {
          border-top-color: #c084fc;
          animation-delay: -0.15s;
        }
        @keyframes spin-ring {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        .loading-title {
          font-size: 1.25rem;
          font-weight: 800;
          color: #f1f5f9;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          margin-bottom: 8px;
          background: linear-gradient(to right, #a78bfa, #c084fc);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: pulse-text 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .loading-subtitle {
          font-size: 0.875rem;
          color: #64748b;
        }
        @keyframes pulse-text {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner-ring">
          <div></div>
          <div></div>
          <div></div>
        </div>
        <div class="loading-title">GM Store</div>
        <div class="loading-subtitle">Loading store resources...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
